# Server Configuration for Test
server.port=0

# In-Memory H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Configurable Engines Parameters for Test
app.conflict.priority.csv=1
app.conflict.priority.pdf=2
app.matching.threshold=0.8
app.matching.weight.email=0.4
app.matching.weight.phone=0.2
app.matching.weight.links=0.2
app.matching.weight.name=0.2
